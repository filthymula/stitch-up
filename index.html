<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 Task Roller</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;800&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Poppins,sans-serif;
        }

        body{

            background:
            radial-gradient(circle at top left,#4f46e5 0%,transparent 30%),
            radial-gradient(circle at bottom right,#7c3aed 0%,transparent 30%),
            linear-gradient(135deg,#090909,#111,#191919);

            background-size:300% 300%;

            animation:bgMove 10s infinite alternate;

            display:flex;
            justify-content:center;
            align-items:center;

            min-height:100vh;
            overflow:hidden;
            color:white;
        }

        @keyframes bgMove{

        0%{background-position:left top;}
        100%{background-position:right bottom;}

        }

        .card{

            width:min(550px,92%);
            padding:45px;

            border-radius:30px;

            background:rgba(255,255,255,.08);

            backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,.15);

            box-shadow:
            0 20px 60px rgba(0,0,0,.4),
            0 0 30px rgba(79,70,229,.4);

            text-align:center;

        }

        h1{

        font-size:52px;
        margin-bottom:10px;

        }

        .subtitle{

        opacity:.7;
        margin-bottom:35px;

        }

        button{

        padding:18px 60px;

        font-size:20px;
        font-weight:700;

        border:none;
        border-radius:18px;

        cursor:pointer;

        background:linear-gradient(90deg,#4f46e5,#7c3aed);

        color:white;

        transition:.25s;

        box-shadow:0 0 25px rgba(99,102,241,.6);

        }

        button:hover{

        transform:translateY(-4px) scale(1.05);

        box-shadow:0 0 45px rgba(124,58,237,.9);

        }

        button:active{

        transform:scale(.96);

        }

        #dice{

        font-size:110px;

        margin:40px 0;

        filter:drop-shadow(0 0 25px #ffffff66);

        }

        .roll{

        animation:spin .35s linear infinite;

        }

        @keyframes spin{

        0%{
        transform:rotate(0deg) scale(1);
        }

        50%{
        transform:rotate(180deg) scale(1.4);
        }

        100%{
        transform:rotate(360deg) scale(1);
        }

        }

        #result{

        opacity:0;
        transform:translateY(20px);

        transition:.45s;

        min-height:120px;

        }

        #result.show{

        opacity:1;
        transform:translateY(0);

        }

        .name{

        font-size:42px;
        font-weight:800;

        color:#73b4ff;

        text-shadow:0 0 20px #73b4ff;

        }

        .task{

        margin-top:15px;

        font-size:34px;

        font-weight:700;

        color:#ffe082;

        text-shadow:0 0 20px gold;

        }

        .footer{

        margin-top:35px;

        opacity:.45;

        font-size:14px;

        }

        @keyframes pop {
            0%{
                transform:scale(.5);
                opacity:0;
            }

            60%{
                transform:scale(1.15);
            }

            100%{
                transform:scale(1);
                opacity:1;
            }
        }

        .pop{
            animation:pop .5s;
        }
            
        @media(max-width:600px) {
            h1{ 
                font-size:38px;
            }

            .name{
                font-size:32px;
            }

            .task{
                font-size:26px;
            }

            #dice{
                font-size:90px;
            }
        }
    </style>
</head>

<body>
    <div class="card">
    <h1>🎲</h1>
    <div class="subtitle">Who's getting stitched up?</div>
        <button onclick="rollTask()">Roll</button>
        <div id="dice">🎲</div>
        <div id="result"></div>
    </div>

    <script>
        const names=[
        "Dave",
        "Jason",
        "Brendan",
        "Lachlan"
        ];

        const tasks=[
        "🥃 Take a shot",
        "🍺 Skull your drink",
        "💨 Have a fat puff"
        ];

        let rolling=false;

        function random(arr){
        return arr[Math.floor(Math.random()*arr.length)];
        }

        function rollTask(){

        if(rolling)return;

        rolling=true;

        const dice=document.getElementById("dice");
        const result=document.getElementById("result");

        dice.classList.add("roll");

        result.classList.remove("show");

        let interval=setInterval(()=>{

        result.innerHTML=`
        <div class="name">${random(names)}</div>
        <div class="task">${random(tasks)}</div>
        `;

        },90);

        setTimeout(()=>{

        clearInterval(interval);

        dice.classList.remove("roll");

        const person=random(names);
        const task=random(tasks);

        result.innerHTML=`
        <div class="pop">
        <div class="name">${person}</div>
        <div class="task">${task}</div>
        </div>
        `;

        result.classList.add("show");

        rolling=false;

        },3000);

        }

    </script>
</body>
</html>
